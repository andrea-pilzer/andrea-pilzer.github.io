title: Andrea Pilzer
tagline: Solutions Architect · Generative AI Training & Inference
description: >-
  Andrea Pilzer is a Solutions Architect at NVIDIA focused on generative AI
  training and inference.
url: "https://andrea-pilzer.github.io"
baseurl: ""
lang: en
timezone: Europe/Rome

author:
  name: Andrea Pilzer

social:
  github: https://github.com/andrea-pilzer
  scholar: https://scholar.google.com/citations?user=zooORRsAAAAJ&hl=en
